name: Sync NFL Weekly Stats

on:
  schedule:
    - cron: '0 8 * * 2'  # Every Tuesday at 08:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync regardless of season window'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd python
          pip install -r requirements.txt

      - name: Run weekly sync
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NFL_SEASON: "2025"
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          cd python
          python scripts/sync_nfl_weekly.py