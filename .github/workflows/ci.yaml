name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. Code Count ──────────────────────────────────────────────────────────
  code-count:
    name: Code Count
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Count lines of code
        run: |
          echo "## Code Count Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cloc \
            --exclude-dir=node_modules,.next,coverage,dist \
            --include-lang=TypeScript,JavaScript,JSON,CSS \
            --quiet \
            . >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Count test coverage (files)
        run: |
          SRC=$(find src -name "*.ts" -o -name "*.tsx" | grep -v "\.d\.ts" | wc -l)
          TESTS=$(find tests -name "*.test.ts" -o -name "*.test.tsx" 2>/dev/null | wc -l)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source files | $SRC |" >> $GITHUB_STEP_SUMMARY
          echo "| Test files | $TESTS |" >> $GITHUB_STEP_SUMMARY

  # ── 2. Project Check ───────────────────────────────────────────────────────
  project-check:
    name: Project Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./test.db

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --max-warnings=0

  # ── 3. Dependency Check ────────────────────────────────────────────────────
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and critical only)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Check for outdated packages
        run: |
          echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm outdated || true >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

  # ── 4. SAST — Semgrep ──────────────────────────────────────────────────────
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # Skip on dependabot PRs — it doesn't have access to secrets
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config auto \
            --config p/typescript \
            --config p/nextjs \
            --config p/secrets \
            --sarif-output=semgrep.sarif \
            --json-output=semgrep.json \
            --quiet || true
        env:
          # Optional: set SEMGREP_APP_TOKEN in repo secrets to use Semgrep Cloud
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      - name: Upload Semgrep JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep.json
          retention-days: 30

      - name: Summarise findings
        if: always()
        run: |
          echo "## Semgrep SAST Results" >> $GITHUB_STEP_SUMMARY
          if [ -f semgrep.json ]; then
            FINDINGS=$(python3 -c "
          import json, sys
          data = json.load(open('semgrep.json'))
          results = data.get('results', [])
          errors  = data.get('errors',  [])
          print(f'| Findings | {len(results)} |')
          print(f'| Errors   | {len(errors)}  |')
          sevs = {}
          for r in results:
              s = r.get('extra', {}).get('severity', 'UNKNOWN')
              sevs[s] = sevs.get(s, 0) + 1
          for s, c in sorted(sevs.items()):
              print(f'| {s} | {c} |')
          ")
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "$FINDINGS" >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file found." >> $GITHUB_STEP_SUMMARY
          fi

  # ── 5. Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Only run tests after project checks and security scan pass
    needs: [project-check, semgrep-sast]
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./test.db

      - name: Run tests
        run: npx jest --coverage --ci
        env:
          PYTHON_API_URL: http://localhost:8000
          NFL_SEASON: "2025"
          ADMIN_USERNAME: admin
          SCHEDULE_MAX_ATTEMPTS: "100"
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./test.db

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: nextjs/coverage/
          retention-days: 14